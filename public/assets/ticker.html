<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    height: 46px;
  }

  .tradingview-widget-container {
    width: 100%;
    height: 46px;
    overflow: hidden;
    border-top: 1px solid rgba(212, 175, 55, .35);
    border-bottom: 1px solid rgba(192, 192, 192, .25);
    background: transparent;
  }

  #tv-ticker {
    width: 100%;
    height: 46px;
    overflow: hidden;
  }
</style>

</head>

<body>

  <div class="tradingview-widget-container">
    <div id="tv-ticker"></div>
  </div>

  <script>
    const config = {
      symbols: [
        { proName: "OANDA:XAGUSD", title: "SILVER" },
        { proName: "OANDA:XAUUSD", title: "GOLD" },
        { proName: "BITSTAMP:BTCUSD", title: "BTC" },
        { proName: "BITSTAMP:ETHUSD", title: "ETH" },
        { proName: "BINANCE:LTCUSDT", title: "LTC" },
        { proName: "BINANCE:SOLUSDT", title: "SOL" },
        { proName: "BINANCE:XRPUSDT", title: "XRP" },
        { proName: "BINANCE:ADAUSDT", title: "ADA" }
      ],
      colorTheme: "light",
      displayMode: "regular",
      showSymbolLogo: true,
      isTransparent: false,
      locale: "en"
    };

    const script = document.createElement("script");
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js";
    script.async = true;
    script.innerHTML = JSON.stringify(config);
    document.getElementById("tv-ticker").appendChild(script);
  </script>

</body>

</html>
